name: Build #scooterarmy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      # Download Google Fonts and embed them as base64 inside the HTML
      # This makes fonts work 100% offline on every device
      - name: Embed Google Fonts offline
        run: |
          python3 << 'PYEOF'
          import urllib.request, base64, re

          UA = 'Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 Chrome/112'

          def fetch_font_css(url):
              req = urllib.request.Request(url, headers={'User-Agent': UA})
              with urllib.request.urlopen(req) as r:
                  return r.read().decode('utf-8')

          def fetch_bytes(url):
              with urllib.request.urlopen(url) as r:
                  return r.read()

          css_orb = fetch_font_css(
              'https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap')
          css_stm = fetch_font_css(
              'https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap')

          combined = css_orb + '\n' + css_stm

          for url in re.findall(r'url\((https://[^)]+)\)', combined):
              data = fetch_bytes(url)
              b64  = base64.b64encode(data).decode('ascii')
              combined = combined.replace(url, f'data:font/woff2;base64,{b64}')

          with open('app/src/main/assets/index.html', 'r') as f:
              html = f.read()

          gf_link = '<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">'
          html = html.replace(gf_link, f'<style>/* FONTS EMBEDDED BY CI */\n{combined}\n</style>')

          with open('app/src/main/assets/index.html', 'w') as f:
              f.write(html)

          print("Fonts embedded successfully")
          PYEOF

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scooterarmy-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
